<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>执行记录详情模态框 - v9 Design</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-light: #EEF2FF;
      --primary-hover: #4338CA;
      --primary-subtle: #E0E7FF;
      --accent: #6366F1;
      --accent-light: #C7D2FE;
      --bg: #F8FAFC;
      --bg-secondary: #F1F5F9;
      --card-bg: #FFFFFF;
      --sidebar-bg: #FFFFFF;
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
      --shadow-glow: 0 0 0 3px rgba(79, 70, 229, 0.2);
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .icon { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2;
      stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

    .background-page {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      opacity: 0.3;
      pointer-events: none;
    }

    .modal-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(15, 23, 42, 0.5);
      backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; z-index:1000;
    }

    .modal {
      background:white; border-radius:var(--radius-xl);
      width:560px; max-height:85vh; overflow:hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      border: 1px solid var(--border);
    }

    .modal-header {
      padding:24px; border-bottom: 1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
      background: var(--bg);
    }
    .modal-title { font-size:17px; font-weight:700; color:var(--text-primary); }
    .modal-close {
      width:32px; height:32px;
      border: 1px solid var(--border); background:white;
      border-radius:var(--radius-sm); cursor:pointer;
      color:var(--text-muted); transition:all var(--transition);
      display:flex; align-items:center; justify-content:center;
    }
    .modal-close:hover { background:var(--primary-light); border-color:var(--accent-light); color:var(--primary); }

    .modal-body { padding:24px; overflow-y:auto; max-height:calc(85vh - 140px); }
    .modal-footer {
      padding:20px 24px; border-top: 1px solid var(--border);
      display:flex; justify-content:flex-end; gap:12px;
      background: var(--bg);
    }

    .modal-btn {
      padding:10px 22px; border: 1px solid var(--border);
      background:white; border-radius:var(--radius-sm);
      font-size:14px; font-weight:600; cursor:pointer;
      transition:all var(--transition); color:var(--text-secondary);
    }
    .modal-btn:hover { background:var(--bg); border-color:var(--accent-light); color:var(--primary); }
    .modal-btn.primary {
      background:linear-gradient(135deg,#4F46E5,#6366F1);
      color:white; border-color:transparent;
      box-shadow:0 4px 12px rgba(79, 70, 229, 0.3);
    }
    .modal-btn.primary:hover { box-shadow:0 6px 16px rgba(79, 70, 229, 0.4); transform:translateY(-1px); }

    .execution-detail { font-size:14px; line-height:1.75; }
    .execution-detail-row { display:flex; margin-bottom:14px; }
    .execution-detail-label { width:110px; font-weight:700; color:var(--text-primary); flex-shrink:0; }
    .execution-detail-value { flex:1; color:var(--text-secondary); }
    .execution-item-status { display:inline-block; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700; }
    .execution-item-status.success { background:#DCFCE7; color:#15803D; }
    .execution-item-status.failed { background:#FEE2E2; color:#DC2626; }
    .execution-detail-content {
      background:var(--bg); border: 1px solid var(--border);
      border-radius:var(--radius-sm); padding:16px; margin-top:14px;
      font-family:'Courier New',monospace; font-size:13px; white-space:pre-wrap; word-break:break-word;
    }
  </style>
</head>
<body>
  <div class="background-page"></div>

  <div class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">执行记录详情</div>
        <button class="modal-close">
          <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="execution-detail">
          <div class="execution-detail-row">
            <div class="execution-detail-label">任务名称</div>
            <div class="execution-detail-value">每日代码审查</div>
          </div>
          <div class="execution-detail-row">
            <div class="execution-detail-label">执行时间</div>
            <div class="execution-detail-value">2026-03-18 09:00:00</div>
          </div>
          <div class="execution-detail-row">
            <div class="execution-detail-label">执行状态</div>
            <div class="execution-detail-value"><span class="execution-item-status success">成功</span></div>
          </div>
          <div class="execution-detail-row">
            <div class="execution-detail-label">执行结果</div>
          </div>
          <div class="execution-detail-content">成功审查 15 个文件，发现 3 个潜在问题：
1. app/models/user.js:45 - 未处理的空值检查
2. services/auth.js:123 - 密码加密强度不足
3. utils/validator.js:67 - SQL 注入风险

建议修复以上问题后再部署到生产环境。</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn primary">关闭</button>
      </div>
    </div>
  </div>
</body>
</html>
