<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建任务模态框 - v9 Design</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-light: #EEF2FF;
      --primary-hover: #4338CA;
      --primary-subtle: #E0E7FF;
      --accent: #6366F1;
      --accent-light: #C7D2FE;
      --bg: #F8FAFC;
      --bg-secondary: #F1F5F9;
      --card-bg: #FFFFFF;
      --sidebar-bg: #FFFFFF;
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
      --shadow-glow: 0 0 0 3px rgba(79, 70, 229, 0.2);
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .icon { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2;
      stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

    .background-page {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      opacity: 0.3;
      pointer-events: none;
    }

    .modal-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(15, 23, 42, 0.5);
      backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; z-index:1000;
    }

    .modal {
      background:white; border-radius:var(--radius-xl);
      width:560px; max-height:85vh; overflow:hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      border: 1px solid var(--border);
    }

    .modal-header {
      padding:24px; border-bottom: 1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
      background: var(--bg);
    }
    .modal-title { font-size:17px; font-weight:700; color:var(--text-primary); }
    .modal-close {
      width:32px; height:32px;
      border: 1px solid var(--border); background:white;
      border-radius:var(--radius-sm); cursor:pointer;
      color:var(--text-muted); transition:all var(--transition);
      display:flex; align-items:center; justify-content:center;
    }
    .modal-close:hover { background:var(--primary-light); border-color:var(--accent-light); color:var(--primary); }

    .modal-body { padding:24px; overflow-y:auto; max-height:calc(85vh - 140px); }
    .modal-footer {
      padding:20px 24px; border-top: 1px solid var(--border);
      display:flex; justify-content:flex-end; gap:12px;
      background: var(--bg);
    }

    .modal-btn {
      padding:10px 22px; border: 1px solid var(--border);
      background:white; border-radius:var(--radius-sm);
      font-size:14px; font-weight:600; cursor:pointer;
      transition:all var(--transition); color:var(--text-secondary);
    }
    .modal-btn:hover { background:var(--bg); border-color:var(--accent-light); color:var(--primary); }
    .modal-btn.primary {
      background:linear-gradient(135deg,#4F46E5,#6366F1);
      color:white; border-color:transparent;
      box-shadow:0 4px 12px rgba(79, 70, 229, 0.3);
    }
    .modal-btn.primary:hover { box-shadow:0 6px 16px rgba(79, 70, 229, 0.4); transform:translateY(-1px); }

    .form-group { margin-bottom:20px; }
    .form-label { font-size:14px; font-weight:700; color:var(--text-primary); margin-bottom:8px; display:block; }
    .form-input, .form-select, .form-textarea {
      width:100%; padding:12px 16px;
      border: 2px solid var(--border); border-radius:var(--radius-sm);
      font-size:14px; transition:all var(--transition);
      color:var(--text-primary); background:white;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline:none; border-color:var(--primary); box-shadow:var(--shadow-glow);
    }
    .form-textarea { min-height:80px; resize:vertical; }
    .form-hint { font-size:12px; color:var(--text-muted); margin-top:6px; }

    .divider { height:1px; background:var(--border); margin:20px 0; }

    .freq-type-tabs { display:flex; gap:0; margin-bottom:20px; border-bottom: 2px solid var(--border); }
    .freq-type-tab {
      padding:12px 20px; border:none; background:transparent;
      border-radius:var(--radius-sm) var(--radius-sm) 0 0;
      font-size:14px; cursor:pointer; color:var(--text-secondary); transition:all var(--transition); font-weight:500; border-bottom:2px solid transparent; margin-bottom:-2px;
    }
    .freq-type-tab:hover { background:var(--bg); }
    .freq-type-tab.active { color:var(--primary); border-bottom-color:var(--primary); background:var(--primary-light); }

    .day-selector { display:flex; gap:10px; flex-wrap:wrap; }
    .day-check { display:none; }
    .day-label {
      padding:8px 18px; border: 2px solid var(--border);
      border-radius:20px; font-size:14px; cursor:pointer;
      transition:all var(--transition); color:var(--text-secondary); font-weight:500;
    }
    .day-check:checked + .day-label {
      background:linear-gradient(135deg,#4F46E5,#6366F1);
      color:white; border-color:transparent;
      box-shadow:0 2px 8px rgba(79, 70, 229, 0.3);
    }
    .time-picker { display:flex; gap:12px; align-items:center; }
    .time-picker .form-input { width:90px; }
  </style>
</head>
<body>
  <div class="background-page"></div>

  <div class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">新建自动化任务</div>
        <button class="modal-close">
          <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="taskId" />
        <div class="form-group">
          <label class="form-label">任务名称</label>
          <input type="text" class="form-input" placeholder="输入任务名称" value="每日数据报告" />
        </div>
        <div class="form-group">
          <label class="form-label">任务描述</label>
          <textarea class="form-textarea" placeholder="描述任务内容...">每天早上 9 点自动生成数据报告并发送到团队群聊</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">执行频率</label>
          <div class="freq-type-tabs">
            <button class="freq-type-tab active" data-type="daily">按天</button>
            <button class="freq-type-tab" data-type="hourly">按时</button>
          </div>
          <div id="freqDaily">
            <div class="form-group">
              <label class="form-label">选择日期</label>
              <div class="day-selector">
                <input type="checkbox" class="day-check" id="day-1" value="1" checked/><label class="day-label" for="day-1">周一</label>
                <input type="checkbox" class="day-check" id="day-2" value="2" checked/><label class="day-label" for="day-2">周二</label>
                <input type="checkbox" class="day-check" id="day-3" value="3" checked/><label class="day-label" for="day-3">周三</label>
                <input type="checkbox" class="day-check" id="day-4" value="4" checked/><label class="day-label" for="day-4">周四</label>
                <input type="checkbox" class="day-check" id="day-5" value="5" checked/><label class="day-label" for="day-5">周五</label>
                <input type="checkbox" class="day-check" id="day-6" value="6"/><label class="day-label" for="day-6">周六</label>
                <input type="checkbox" class="day-check" id="day-7" value="7"/><label class="day-label" for="day-7">周日</label>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">执行时间</label>
              <div class="time-picker">
                <input type="number" class="form-input" id="taskHour" min="0" max="23" value="9" placeholder="时" />
                <span>:</span>
                <input type="number" class="form-input" id="taskMinute" min="0" max="59" value="0" placeholder="分" />
              </div>
            </div>
          </div>
          <div id="freqHourly" style="display:none;">
            <div class="form-group">
              <label class="form-label">间隔小时数</label>
              <input type="number" class="form-input" id="taskInterval" min="1" placeholder="例如：2" value="1" />
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">任务状态</label>
          <select class="form-select" id="taskStatus">
            <option value="active" selected>运行中</option>
            <option value="paused">已暂停</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn">取消</button>
        <button class="modal-btn primary">保存任务</button>
      </div>
    </div>
  </div>
</body>
</html>
