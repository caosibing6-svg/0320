<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>技能详情模态框 - v9 Design</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-light: #EEF2FF;
      --primary-hover: #4338CA;
      --primary-subtle: #E0E7FF;
      --accent: #6366F1;
      --accent-light: #C7D2FE;
      --bg: #F8FAFC;
      --bg-secondary: #F1F5F9;
      --card-bg: #FFFFFF;
      --sidebar-bg: #FFFFFF;
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
      --shadow-glow: 0 0 0 3px rgba(79, 70, 229, 0.2);
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .icon { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2;
      stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

    /* 技能广场背景（简化） */
    .background-page {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      opacity: 0.3;
      pointer-events: none;
    }

    /* 模态框遮罩 */
    .modal-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(15, 23, 42, 0.5);
      backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; z-index:1000;
    }

    /* 模态框 */
    .modal {
      background:white; border-radius:var(--radius-xl);
      width:560px; max-height:85vh; overflow:hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      border: 1px solid var(--border);
    }

    .modal-header {
      padding:24px; border-bottom: 1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
      background: var(--bg);
    }
    .modal-title { font-size:17px; font-weight:700; color:var(--text-primary); }
    .modal-close {
      width:32px; height:32px;
      border: 1px solid var(--border); background:white;
      border-radius:var(--radius-sm); cursor:pointer;
      color:var(--text-muted); transition:all var(--transition);
      display:flex; align-items:center; justify-content:center;
    }
    .modal-close:hover { background:var(--primary-light); border-color:var(--accent-light); color:var(--primary); }

    .modal-body { padding:24px; overflow-y:auto; max-height:calc(85vh - 140px); }
    .modal-footer {
      padding:20px 24px; border-top: 1px solid var(--border);
      display:flex; justify-content:flex-end; gap:12px;
      background: var(--bg);
    }

    .modal-btn {
      padding:10px 22px; border: 1px solid var(--border);
      background:white; border-radius:var(--radius-sm);
      font-size:14px; font-weight:600; cursor:pointer;
      transition:all var(--transition); color:var(--text-secondary);
    }
    .modal-btn:hover { background:var(--bg); border-color:var(--accent-light); color:var(--primary); }
    .modal-btn.primary {
      background:linear-gradient(135deg,#4F46E5,#6366F1);
      color:white; border-color:transparent;
      box-shadow:0 4px 12px rgba(79, 70, 229, 0.3);
    }
    .modal-btn.primary:hover { box-shadow:0 6px 16px rgba(79, 70, 229, 0.4); transform:translateY(-1px); }

    /* 技能详情内容 */
    .skill-hero {
      display:flex; align-items:center; gap:16px;
      margin-bottom:20px;
    }
    .skill-icon {
      width:56px; height:56px; border-radius:var(--radius-md);
      display:flex; align-items:center; justify-content:center;
      font-size:26px; box-shadow:var(--shadow-sm);
    }
    .skill-info { flex:1; }
    .skill-name { font-size:18px; font-weight:700; color:var(--text-primary); }
    .skill-desc { font-size:14px; color:var(--text-secondary); margin-top:4px; }

    .divider { height:1px; background:var(--border); margin:20px 0; }

    .form-group { margin-bottom:20px; }
    .form-label { font-size:14px; font-weight:700; color:var(--text-primary); margin-bottom:8px; display:block; }
    .form-content { font-size:14px; color:var(--text-secondary); line-height:1.7; }

    .skill-tags { display:flex; gap:6px; flex-wrap:wrap; }
    .skill-tag {
      padding:5px 12px; background:var(--bg);
      border: 1px solid var(--border-light);
      border-radius:20px; font-size:12px; color:var(--text-secondary); font-weight:500;
    }
  </style>
</head>
<body>
  <div class="background-page"></div>

  <!-- 技能详情模态框 -->
  <div class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">技能详情</div>
        <button class="modal-close">
          <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="skill-hero">
          <div class="skill-icon" style="background:#3B82F6; color:white;">🔍</div>
          <div class="skill-info">
            <div class="skill-name">代码分析</div>
            <div class="skill-desc">分析代码结构和问题</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="form-group">
          <label class="form-label">功能说明</label>
          <div class="form-content">智能分析代码结构，识别潜在问题，提供优化建议。支持多种编程语言，能够理解复杂的代码逻辑，帮助提升代码质量和可维护性。</div>
        </div>
        <div class="form-group">
          <label class="form-label">适用场景</label>
          <div class="form-content">适用于代码审查、性能优化、重构建议等场景，能够智能识别上下文并提供精准的辅助建议。</div>
        </div>
        <div class="form-group">
          <label class="form-label">技能标签</label>
          <div class="skill-tags">
            <span class="skill-tag">代码</span>
            <span class="skill-tag">开发</span>
            <span class="skill-tag">分析</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn">关闭</button>
        <button class="modal-btn primary">配置技能</button>
      </div>
    </div>
  </div>
</body>
</html>
