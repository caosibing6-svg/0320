<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导入技能 - v9 Design</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-light: #EEF2FF;
      --primary-hover: #4338CA;
      --primary-subtle: #E0E7FF;
      --accent: #6366F1;
      --accent-light: #C7D2FE;
      --bg: #F8FAFC;
      --bg-secondary: #F1F5F9;
      --card-bg: #FFFFFF;
      --sidebar-bg: #FFFFFF;
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --border: #E2E8F0;
      --border-light: #F1F5F9;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
      --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
      --shadow-glow: 0 0 0 3px rgba(79, 70, 229, 0.2);
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .icon { width:20px; height:20px; fill:none; stroke:currentColor; stroke-width:2;
      stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }

    .background-page {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      opacity: 0.3;
      pointer-events: none;
    }

    .modal-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(15, 23, 42, 0.5);
      backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center; z-index:1000;
    }

    .modal {
      background:white; border-radius:var(--radius-xl);
      width:560px; max-height:85vh; overflow:hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      border: 1px solid var(--border);
    }

    .modal-header {
      padding:24px; border-bottom: 1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
      background: var(--bg);
    }
    .modal-title { font-size:17px; font-weight:700; color:var(--text-primary); }
    .modal-close {
      width:32px; height:32px;
      border: 1px solid var(--border); background:white;
      border-radius:var(--radius-sm); cursor:pointer;
      color:var(--text-muted); transition:all var(--transition);
      display:flex; align-items:center; justify-content:center;
    }
    .modal-close:hover { background:var(--primary-light); border-color:var(--accent-light); color:var(--primary); }

    .modal-body { padding:24px; overflow-y:auto; max-height:calc(85vh - 140px); }
    .modal-footer {
      padding:20px 24px; border-top: 1px solid var(--border);
      display:flex; justify-content:flex-end; gap:12px;
      background: var(--bg);
    }

    .modal-btn {
      padding:10px 22px; border: 1px solid var(--border);
      background:white; border-radius:var(--radius-sm);
      font-size:14px; font-weight:600; cursor:pointer;
      transition:all var(--transition); color:var(--text-secondary);
    }
    .modal-btn:hover { background:var(--bg); border-color:var(--accent-light); color:var(--primary); }
    .modal-btn.primary {
      background:linear-gradient(135deg,#4F46E5,#6366F1);
      color:white; border-color:transparent;
      box-shadow:0 4px 12px rgba(79, 70, 229, 0.3);
    }
    .modal-btn.primary:hover { box-shadow:0 6px 16px rgba(79, 70, 229, 0.4); transform:translateY(-1px); }

    .form-group { margin-bottom:20px; }
    .form-label { font-size:14px; font-weight:700; color:var(--text-primary); margin-bottom:8px; display:block; }
    .form-input, .form-select, .form-textarea {
      width:100%; padding:12px 16px;
      border: 2px solid var(--border); border-radius:var(--radius-sm);
      font-size:14px; transition:all var(--transition);
      color:var(--text-primary); background:white;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline:none; border-color:var(--primary); box-shadow:var(--shadow-glow);
    }
    .form-textarea { min-height:100px; resize:vertical; }
    .form-hint { font-size:12px; color:var(--text-muted); margin-top:6px; }

    .divider { height:1px; background:var(--border); margin:20px 0; }

    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: var(--bg);
    }
    .upload-area:hover {
      border-color: var(--accent-light);
      background: var(--primary-light);
    }
    .upload-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      color: var(--primary);
      font-size: 24px;
    }
    .upload-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .upload-desc {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .import-methods {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .import-method {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
    }
    .import-method:hover {
      border-color: var(--accent-light);
      background: var(--primary-light);
    }
    .import-method.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .import-method-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .import-method-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .skill-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 16px;
      border-left: 4px solid var(--primary);
    }
    .skill-preview-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .skill-preview-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      line-height: 1.6;
    }
    .skill-preview-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .skill-preview-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="background-page"></div>

  <div class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">导入技能</div>
        <button class="modal-close">
          <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <!-- 导入方式选择 -->
        <div class="form-group">
          <label class="form-label">选择导入方式</label>
          <div class="import-methods">
            <div class="import-method selected">
              <div class="import-method-icon">📁</div>
              <div class="import-method-title">上传文件</div>
            </div>
            <div class="import-method">
              <div class="import-method-icon">🔗</div>
              <div class="import-method-title">从 URL</div>
            </div>
            <div class="import-method">
              <div class="import-method-icon">📦</div>
              <div class="import-method-title">代码仓库</div>
            </div>
          </div>
        </div>

        <!-- 文件上传区域 -->
        <div class="form-group">
          <label class="form-label">上传技能文件</label>
          <div class="upload-area">
            <div class="upload-icon">📤</div>
            <div class="upload-title">点击或拖拽文件到此处</div>
            <div class="upload-desc">支持 SKILL.md、ZIP 格式，最大 10MB</div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 技能预览 -->
        <div class="skill-preview">
          <div class="skill-preview-title">数据分析助手</div>
          <div class="skill-preview-desc">强大的数据分析能力，支持 Excel、CSV、数据库等多种数据源。可以快速进行数据清洗、统计分析、趋势预测等操作。</div>
          <div class="skill-preview-tags">
            <span class="skill-preview-tag">数据分析</span>
            <span class="skill-preview-tag">Excel</span>
            <span class="skill-preview-tag">Python</span>
            <span class="skill-preview-tag">可视化</span>
          </div>
        </div>

        <!-- 表单字段 -->
        <div class="form-group">
          <label class="form-label">技能名称</label>
          <input type="text" class="form-input" value="数据分析助手" />
        </div>

        <div class="form-group">
          <label class="form-label">技能描述</label>
          <textarea class="form-textarea">强大的数据分析能力，支持 Excel、CSV、数据库等多种数据源。可以快速进行数据清洗、统计分析、趋势预测等操作，帮助您从数据中挖掘有价值的信息。</textarea>
        </div>

        <div class="form-group">
          <label class="form-label">技能分类</label>
          <select class="form-select">
            <option>数据处理</option>
            <option>AI 助手</option>
            <option>开发工具</option>
            <option>生产力工具</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">安装范围</label>
          <select class="form-select">
            <option>用户级（仅当前用户可用）</option>
            <option>项目级（当前项目所有成员可用）</option>
          </select>
          <div class="form-hint">用户级技能安装在 ~/.workbuddy/skills/，项目级技能安装在 {workspace}/.workbuddy/skills/</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn">取消</button>
        <button class="modal-btn" style="margin-right: auto;">
          <svg class="icon" style="width:14px; height:14px; margin-right:4px; display:inline-block;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
          安全扫描
        </button>
        <button class="modal-btn primary">导入技能</button>
      </div>
    </div>
  </div>
</body>
</html>
